name: Hexo Deploy

on:
  push:
    branches:
      - source

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Branch
      uses: actions/checkout@v3
      with:
        ref: source

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Dependencies
      run: |
        npm install

    - name: Clean Old Files
      run: |
        rm -rf public
        rm -rf .deploy_git

    - name: Generate Static Files
      run: |
        npx hexo clean
        npx hexo generate

    - name: Deploy to Master Branch
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
        publish_branch: master
        keep_files: false
        force_orphan: true

    - name: Deploy Success
      run: |
        echo "✅ 部署成功！"
        echo "🌐 访问：https://codefan.github.io"
